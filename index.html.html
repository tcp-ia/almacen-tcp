<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
:root{
  --bg:#0b0f18;--surface:#131927;--surface2:#1a2235;--surface3:#212d42;
  --border:#263044;--accent:#f0a500;--accent2:#e05c2a;
  --ok:#27ae60;--warn:#e67e22;--danger:#e74c3c;--info:#2980b9;
  --text:#e8edf5;--muted:#6b7a96;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{max-width:500px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{background:var(--surface);border-bottom:2px solid var(--accent);padding:12px 14px 8px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:900;letter-spacing:1px;color:var(--accent)}
.logo span{color:var(--muted);font-weight:400}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:4px;transition:background .3s}
.sync-dot.online{background:var(--ok);box-shadow:0 0 6px var(--ok)}
.sync-dot.syncing{background:var(--warn);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-label{font-size:10px;color:var(--muted)}

.nav{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;border:none;background:var(--bg);color:var(--muted);cursor:pointer;font-family:'Barlow',sans-serif;letter-spacing:.3px;white-space:nowrap}
.nav-btn.active{background:var(--accent);color:#000}
.nav-btn:active{transform:scale(.95)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:10px 10px 80px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* CARDS */
.card{background:var(--surface);border-radius:var(--radius);padding:13px;margin-bottom:9px;border:1px solid var(--border)}
.card-hdr{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.card-hdr .dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.stat{background:var(--surface2);border-radius:10px;padding:10px 6px;text-align:center;border:1px solid var(--border)}
.stat-n{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;line-height:1}
.stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px}
.search-inp{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:9px 12px 9px 36px;color:var(--text);font-size:15px;font-family:'Barlow',sans-serif;outline:none}
.search-inp:focus{border-color:var(--accent)}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted)}
.filters{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:8px}
.filters::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;font-family:'Barlow',sans-serif}
.fbtn.on{border-color:var(--accent);color:var(--accent);background:var(--surface2)}

/* PRODUCT ITEM */
.pi{background:var(--surface2);border-radius:9px;padding:10px 11px;margin-bottom:6px;border:1px solid var(--border);cursor:pointer;transition:transform .1s;display:flex;align-items:center;gap:9px}
.pi:active{transform:scale(.98)}
.pi.ok{border-left:3px solid var(--ok)}
.pi.low{border-left:3px solid var(--warn)}
.pi.out{border-left:3px solid var(--danger)}
.pi-info{flex:1;min-width:0}
.pi-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-meta{font-size:10px;color:var(--muted);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
.pi-stock{text-align:right;flex-shrink:0}
.pi-qty{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;line-height:1}
.pi-und{font-size:9px;color:var(--muted)}

/* BADGE */
.badge{display:inline-flex;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.b-ok{background:#0d2a1a;color:var(--ok)}
.b-warn{background:#2a1a0a;color:var(--warn)}
.b-danger{background:#2a0d0d;color:var(--danger)}
.b-info{background:#0d1a2a;color:var(--info)}
.b-purple{background:#1a0d2a;color:#9b59b6}

/* FORM */
.fg{margin-bottom:11px}
.fl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.fi,.fs,.fta{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:14px;font-family:'Barlow',sans-serif;outline:none;appearance:none;-webkit-appearance:none}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--accent)}
.fta{resize:none;min-height:60px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* CODE SEARCH INPUT */
.code-search{position:relative}
.code-search .fi{padding-right:80px;font-size:16px;font-weight:600}
.code-search-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:var(--accent);color:#000;border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif}
.product-preview{background:var(--surface3);border-radius:8px;padding:10px;margin-bottom:10px;border:1px solid var(--accent);display:none}
.product-preview.show{display:block}
.pp-name{font-size:14px;font-weight:700;margin-bottom:4px}
.pp-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}

/* BUTTON */
.btn{padding:11px;border-radius:9px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:'Barlow',sans-serif;letter-spacing:.3px;transition:all .15s;text-align:center;display:block;width:100%}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#000}
.btn-secondary{background:var(--surface2);color:var(--text);border:1.5px solid var(--border)}
.btn-danger{background:#2a0d0d;color:var(--danger);border:1px solid var(--danger)}
.btn-info{background:#0d1a2a;color:var(--info);border:1px solid var(--info)}
.btn-sm{padding:6px 12px;font-size:12px;width:auto;display:inline-block}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:4px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;backdrop-filter:blur(4px);align-items:flex-end}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:18px;width:100%;max-height:92vh;overflow-y:auto;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:38px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:800;margin-bottom:3px}
.modal-sub{font-size:11px;color:var(--muted);margin-bottom:14px}

/* DETAIL GRID */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.di{background:var(--surface2);border-radius:8px;padding:9px}
.di-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.di-v{font-size:14px;font-weight:600}

/* MOVE ITEM */
.mi{background:var(--surface2);border-radius:9px;padding:10px;margin-bottom:6px;border:1px solid var(--border);display:flex;align-items:center;gap:9px}
.mi-ico{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mi-info{flex:1;min-width:0}
.mi-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-detail{font-size:10px;color:var(--muted);margin-top:2px}
.mi-qty{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;flex-shrink:0}

/* REMISION */
.rem-item{background:var(--surface2);border-radius:9px;padding:11px;margin-bottom:7px;border:1px solid var(--border)}
.rem-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.rem-num{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--accent)}
.rem-items{margin-top:6px;font-size:11px;color:var(--muted)}
.rem-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)}
.rem-row:last-child{border:none}

/* TABS */
.stabs{display:flex;gap:4px;margin-bottom:11px;overflow-x:auto;scrollbar-width:none}
.stabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;flex:1;padding:7px 6px;border-radius:8px;font-size:11px;font-weight:600;border:none;background:var(--bg);color:var(--muted);cursor:pointer;font-family:'Barlow',sans-serif;text-align:center;min-width:60px}
.stab.on{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

/* ALERT */
.alert{background:linear-gradient(135deg,#2a0d0d,#1a0808);border:1px solid var(--danger);border-radius:9px;padding:11px;margin-bottom:9px;display:flex;align-items:center;gap:9px}
.alert .ico{font-size:20px}
.alert-t{font-size:12px;font-weight:700;color:var(--danger)}
.alert-s{font-size:10px;color:var(--muted);margin-top:2px}

/* EMPTY */
.empty{text-align:center;padding:36px 16px;color:var(--muted)}
.empty .ico{font-size:42px;margin-bottom:10px}
.empty .msg{font-size:14px;font-weight:500}

/* TOAST */
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%) translateY(-16px);background:var(--surface);color:var(--ok);border:1px solid var(--ok);border-radius:20px;padding:7px 16px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--danger);color:var(--danger)}

/* LOADER */
.loader{text-align:center;padding:30px;color:var(--muted);font-size:13px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* CHIP */
.chip{display:inline-flex;padding:2px 7px;border-radius:5px;font-size:10px;background:var(--surface);border:1px solid var(--border);color:var(--muted)}

/* REM LINE */
.rem-line{display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:center;background:var(--bg);border-radius:7px;padding:8px;margin-bottom:6px}
.rem-line-x{background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer;padding:0 4px}
</style>
</head>

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let DB = null;
let isOnline = false;
let state = {
  tab: 'dashboard',
  sub: 'lista',
  search: '',
  catFilter: 'Todos',
  statFilter: 'Todos',
  stockOverrides: {},   // {codigo: existencia_actual}
  movements: {},
  remisiones: {},
  loans: {},
  orders: {}
};

// Local fallback
function loadLocal() {
  try { state.stockOverrides = JSON.parse(localStorage.getItem('tcp_stock') || '{}'); } catch(e){}
  try { state.movements    = JSON.parse(localStorage.getItem('tcp_moves') || '{}'); } catch(e){}
  try { state.remisiones   = JSON.parse(localStorage.getItem('tcp_rem')   || '{}'); } catch(e){}
  try { state.loans        = JSON.parse(localStorage.getItem('tcp_loans') || '{}'); } catch(e){}
  try { state.orders       = JSON.parse(localStorage.getItem('tcp_ord')   || '{}'); } catch(e){}
}
function saveLocal() {
  localStorage.setItem('tcp_stock', JSON.stringify(state.stockOverrides));
  localStorage.setItem('tcp_moves', JSON.stringify(state.movements));
  localStorage.setItem('tcp_rem',   JSON.stringify(state.remisiones));
  localStorage.setItem('tcp_loans', JSON.stringify(state.loans));
  localStorage.setItem('tcp_ord',   JSON.stringify(state.orders));
}

// ═══════════════════════════════════════════════════════════════
// FIREBASE INIT
// ═══════════════════════════════════════════════════════════════
function initFirebase() {
  try {
    const app = firebase.initializeApp(FB_CONFIG);
    DB = firebase.database(app);

    DB.ref('.info/connected').on('value', snap => {
      isOnline = snap.val() === true;
      setSyncUI(isOnline ? 'online' : 'offline');
    });

    // Escuchar cambios en tiempo real
    DB.ref('tcp').on('value', snap => {
      const data = snap.val() || {};
      if (data.stock)     state.stockOverrides = data.stock;
      if (data.moves)     state.movements      = data.moves;
      if (data.rem)       state.remisiones     = data.rem;
      if (data.loans)     state.loans          = data.loans;
      if (data.orders)    state.orders         = data.orders;
      saveLocal();
      setSyncUI('online');
      render();
    });
  } catch(e) {
    console.warn('Firebase no configurado, usando modo local:', e.message);
    setSyncUI('offline');
    loadLocal();
    render();
  }
}

function dbSet(path, val) {
  if (DB && isOnline) {
    setSyncUI('syncing');
    return DB.ref('tcp/' + path).set(val)
      .then(() => setSyncUI('online'))
      .catch(e => { setSyncUI('offline'); saveLocal(); });
  } else {
    saveLocal();
    return Promise.resolve();
  }
}

function setSyncUI(status) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  if (!dot) return;
  dot.className = 'sync-dot ' + status;
  lbl.textContent = status === 'online' ? 'En línea' : status === 'syncing' ? 'Sincronizando...' : 'Sin conexión';
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function getStock(codigo) {
  const ov = state.stockOverrides[codigo];
  return ov !== undefined ? ov : (CATALOG[codigo] ? CATALOG[codigo].existencia : 0);
}
function getStatus(p) {
  const ex = getStock(p.codigo);
  if (ex <= 0) return 'Agotado';
  if (ex < p.stock_min) return 'Menor al mínimo';
  return 'OK';
}
function getProducts() {
  return BASE_CATALOG.map(p => ({
    ...p,
    existencia: getStock(p.codigo),
    status: getStatus(p)
  }));
}
function objArr(obj) { return obj ? Object.values(obj) : []; }
function ts() { return Date.now(); }
function todayISO() { return new Date().toISOString().split('T')[0]; }
function fmtMoney(n) { return n ? '$' + Number(n).toLocaleString('es-CO') : 'N/D'; }
function fmtDate(iso) { if (!iso) return '—'; const d = new Date(iso+'T00:00:00'); return d.toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'}); }
function nextNum(obj, prefix) {
  const keys = Object.keys(obj || {});
  return prefix + String(keys.length + 1).padStart(4,'0');
}

function findProduct(query) {
  query = String(query).trim().toLowerCase();
  const byCode = BASE_CATALOG.find(p => String(p.codigo) === query);
  if (byCode) return byCode;
  return BASE_CATALOG.find(p => p.producto.toLowerCase().includes(query));
}

// ═══════════════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════════════
function render() {
  const mc = document.getElementById('mainContent');
  if (!mc) return;
  const prods = getProducts();
  const pages = { dashboard: renderDash, inventario: renderInv, movimientos: renderMovs, remisiones: renderRemisiones, prestamos: renderPrestamos, compras: renderCompras, reportes: renderReportes };
  mc.innerHTML = (pages[state.tab] || renderDash)(prods);
  bindNav();
}

function bindNav() {
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.onclick = () => { state.tab = b.dataset.tab; state.sub = 'lista'; render(); };
  });
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === state.tab));
}

// DASHBOARD
// ═══════════════════════════════════════════════════════════════
function renderDash(prods) {
  const ok = prods.filter(p=>p.status==='OK').length;
  const low = prods.filter(p=>p.status==='Menor al mínimo').length;
  const out = prods.filter(p=>p.status==='Agotado').length;
  const alerts = prods.filter(p=>p.status!=='OK').slice(0,5);
  const moves = objArr(state.movements).slice(-3).reverse();
  return `
    <div class="stats">

// ═══════════════════════════════════════════════════════════════
// INVENTARIO
// ═══════════════════════════════════════════════════════════════
function renderInv(prods) {
  const cats = ['Todos', ...new Set(prods.map(p=>p.categoria).filter(Boolean).sort())];
  const stats = ['Todos','OK','Menor al mínimo','Agotado'];
  let list = prods.filter(p => {
    const q = state.search.toLowerCase();
    const ms = !q || p.producto.toLowerCase().includes(q) || String(p.codigo).includes(q) || p.ubicacion.toLowerCase().includes(q);
    const mc = state.catFilter==='Todos' || p.categoria===state.catFilter;
    const mst = state.statFilter==='Todos' || p.status===state.statFilter;
    return ms && mc && mst;
  });
  return `
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input class="search-inp" type="search" placeholder="Código, nombre o ubicación..." value="${state.search}"
        oninput="state.search=this.value;render()">
    </div>
    <div class="filters">${stats.map(s=>`<button class="fbtn ${state.statFilter===s?'on':''}" onclick="state.statFilter='${s}';render()">${s}</button>`).join('')}</div>
    <div class="filters">${cats.map(c=>`<button class="fbtn ${state.catFilter===c?'on':''}" onclick="state.catFilter='${c}';render()">${c==='Todos'?'Todas':c}</button>`).join('')}</div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:7px">${list.length} productos</div>
    ${list.length===0?`<div class="empty"><div class="ico">📦</div><div class="msg">Sin resultados</div></div>`:list.map(p=>prodItemHtml(p)).join('')}`;
}

function prodItemHtml(p) {
  const sc = p.status==='Agotado'?'out':p.status==='Menor al mínimo'?'low':'ok';
  const qc = p.existencia<=0?'qty-out':p.existencia<p.stock_min?'qty-warn':'qty-ok';
  return `<div class="pi ${sc}" onclick="openProdDetail(${p.codigo})">
    <div class="pi-info">
      <div class="pi-name">${p.producto}</div>
      <div class="pi-meta"><span>${p.codigo}</span><span>${p.categoria}</span>${p.ubicacion?`<span class="chip">${p.ubicacion}</span>`:''}</div>
    </div>
    <div class="pi-stock">
      <div class="pi-qty" style="color:${p.existencia<=0?'var(--danger)':p.existencia<p.stock_min?'var(--warn)':'var(--ok)'}">${p.existencia}</div>
      <div class="pi-und">${p.und}</div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// MOVIMIENTOS
// ═══════════════════════════════════════════════════════════════
function renderMovs(prods) {
  const subs = ['entrada','salida','historial'];
  if (!subs.includes(state.sub)) state.sub = 'entrada';
  const moves = objArr(state.movements).reverse();
  return `
    <div class="stabs">
      <button class="stab ${state.sub==='entrada'?'on':''}" onclick="state.sub='entrada';render()">📥 Entrada</button>
      <button class="stab ${state.sub==='salida'?'on':''}" onclick="state.sub='salida';render()">📤 Despacho</button>
      <button class="stab ${state.sub==='historial'?'on':''}" onclick="state.sub='historial';render()">📋 Historial</button>
    </div>
    ${state.sub==='historial'?
      (moves.length===0?`<div class="empty"><div class="ico">📋</div><div class="msg">Sin movimientos</div></div>`:moves.map(m=>moveItemHtml(m)).join(''))
      :state.sub==='entrada'?entradaFormHtml(prods):salidaFormHtml(prods)}`;
}

function moveItemHtml(m) {
  const isIn = m.tipo==='ENTRADA', isDev = m.tipo==='DEVOLUCION';
  const cls = isIn?'#0d2a1a':isDev?'#1a0d2a':'#2a0d0d';
  const icon = isIn?'📥':isDev?'↩️':'📤';
  const sign = (isIn||isDev)?'+':'-';
  const color = (isIn||isDev)?'var(--ok)':'var(--danger)';
  return `<div class="mi">
    <div class="mi-ico" style="background:${cls}">${icon}</div>
    <div class="mi-info">
      <div class="mi-name">${m.producto||'—'}</div>
      <div class="mi-detail">${m.fecha||''} · Cód: ${m.codigo||'—'} · ${m.responsable||'—'}</div>
      ${m.descripcion?`<div class="mi-detail">${m.descripcion}</div>`:''}
    </div>
    <div class="mi-qty" style="color:${color}">${sign}${m.cantidad}</div>
  </div>`;
}

function codeSearchHtml(id, label='Código Interno del Producto') {
  return `
    <div class="fg">
      <label class="fl">${label}</label>
      <div class="code-search">
        <input class="fi" type="text" id="${id}" placeholder="Ej: 1001, 1079..." 
          oninput="previewProduct('${id}')"
          onkeydown="if(event.key==='Enter'){previewProduct('${id}');event.preventDefault()}">
        <button class="code-search-btn" onclick="previewProduct('${id}')">Buscar</button>
      </div>
      <div class="product-preview" id="pp_${id}">
        <div class="pp-name" id="pp_name_${id}"></div>
        <div class="pp-meta" id="pp_meta_${id}"></div>
      </div>
    </div>`;

function previewProduct(inputId) {
  const val = document.getElementById(inputId).value;
  const prod = findProduct(val);
  const pp = document.getElementById('pp_'+inputId);
  const pname = document.getElementById('pp_name_'+inputId);
  const pmeta = document.getElementById('pp_meta_'+inputId);
  if (prod) {
    const ex = getStock(prod.codigo);
    const st = getStatus(prod);
    const sc = st==='Agotado'?'b-danger':st==='Menor al mínimo'?'b-warn':'b-ok';
    pname.textContent = prod.producto;
    pmeta.innerHTML = `<span>${prod.codigo}</span><span>${prod.categoria}</span><span class="chip">${prod.ubicacion}</span><span class="badge ${sc}">${ex} ${prod.und}</span>`;
    pp.classList.add('show');
    // Fill codigo field if user typed a name
    document.getElementById(inputId).value = prod.codigo;
  } else {
    pp.classList.remove('show');
    if (val) toast('⚠️ Código no encontrado', true);
  }
}

function autoFillRemItem(idx) {
  const codEl = document.getElementById('ri_cod_'+idx);
  if (!codEl) return;
  const prod = findProduct(codEl.value);
  const prev = document.getElementById('ri_prev_'+idx);
  if (prod && prev) {
    const ex = getStock(prod.codigo);
    prev.textContent = prod.producto + ' · Exist: ' + ex + ' ' + prod.und;
    codEl.value = prod.codigo;
  }
}

let remItemCount = 1;
function addRemItem() {
  const wrap = document.getElementById('rem-items-wrap');
  if (!wrap) return;
  const div = document.createElement('div');
  div.className = 'rem-line';
  div.id = 'ri-' + remItemCount;
  div.innerHTML = codeSearchInlineHtml(remItemCount);
  wrap.appendChild(div);
  remItemCount++;
}

function removeRemItem(idx) {
  const el = document.getElementById('ri-'+idx);
  if (el) el.remove();
}

function compraFormHtml(prods) {

let scItemCount = 1;
function addScItem() {
  const wrap = document.getElementById('sc-items-wrap');
  if (!wrap) return;
  const d = document.createElement('div');
  d.className='rem-line'; d.id='sci-'+scItemCount;
  d.innerHTML = scItemHtml(scItemCount, BASE_CATALOG);
  wrap.appendChild(d);
  scItemCount++;
}
function removeScItem(idx) { const e=document.getElementById('sci-'+idx); if(e) e.remove(); }
function autoFillScItem(idx) {
  const codEl = document.getElementById('sci_cod_'+idx);
  if (!codEl) return;
  const prod = findProduct(codEl.value);
  const prev = document.getElementById('sci_prev_'+idx);
  if (prod && prev) { prev.textContent = prod.producto + ' · Exist: '+getStock(prod.codigo)+' '+prod.und; codEl.value = prod.codigo; }
}

function updateStock(codigo, delta) {
  const actual = getStock(codigo);
  const nuevo = Math.round((actual + delta) * 100) / 100;
  state.stockOverrides[codigo] = nuevo;
  dbSet('stock', state.stockOverrides);
}

function registrarEntrada() {
  const codigo = parseInt(document.getElementById('f_cod_ent').value);
  const cant = parseFloat(document.getElementById('f_cant_ent').value||0);
  if (!codigo||isNaN(codigo)||!CATALOG[codigo]) { toast('⚠️ Código de producto inválido',true); return; }
  if (cant<=0) { toast('⚠️ Ingresa una cantidad válida',true); return; }
  const p = CATALOG[codigo];
  const id = 'mov_'+ts();
  const mov = {
    id, tipo:'ENTRADA', codigo, producto:p.producto, und:p.und, cantidad:cant,
    fecha: document.getElementById('f_fecha_ent').value,
    remision: document.getElementById('f_rem_ent').value,
    proveedor: document.getElementById('f_prov_ent').value,
    responsable: document.getElementById('f_resp_ent').value,
    descripcion: document.getElementById('f_obs_ent').value,
    ts: ts()
  };
  state.movements[id] = mov;
  dbSet('moves', state.movements);
  updateStock(codigo, cant);
  toast(`✅ Entrada registrada: +${cant} ${p.und} · ${p.producto}`);
  state.sub='historial'; render();
}

function registrarSalida() {
  const codigo = parseInt(document.getElementById('f_cod_sal').value);
  const cant = parseFloat(document.getElementById('f_cant_sal').value||0);
  if (!codigo||isNaN(codigo)||!CATALOG[codigo]) { toast('⚠️ Código de producto inválido',true); return; }
  if (cant<=0) { toast('⚠️ Ingresa una cantidad válida',true); return; }
  const actual = getStock(codigo);
  if (cant > actual) { toast(`⛔ Stock insuficiente. Existencia: ${actual}`,true); return; }
  const p = CATALOG[codigo];
  const id = 'mov_'+ts();
  const mov = {
    id, tipo:'SALIDA', codigo, producto:p.producto, und:p.und, cantidad:cant,
    fecha: document.getElementById('f_fecha_sal').value,
    remision: document.getElementById('f_nsol_sal').value,
    responsable: document.getElementById('f_resp_sal').value,
    autorizado: document.getElementById('f_auth_sal').value,
    descripcion: document.getElementById('f_dest_sal').value,
    ts: ts()
  };
  state.movements[id] = mov;
  dbSet('moves', state.movements);
  updateStock(codigo, -cant);
  toast(`✅ Despacho registrado: -${cant} ${p.und} · ${p.producto}`);
  state.sub='historial'; render();
}

function registrarRemision() {
  const elaboradoPor = document.getElementById('f_elab_rem').value;
  if (!elaboradoPor) { toast('⚠️ Ingresa quien elabora',true); return; }
  const items = [];
  document.querySelectorAll('.rem-line').forEach(el => {
    const codEl = el.querySelector('.ri-cod');
    const cantEl = el.querySelector('.ri-cant');
    if (!codEl || !cantEl) return;
    const codigo = parseInt(codEl.value);
    const cant = parseFloat(cantEl.value||0);
    if (codigo && cant > 0 && CATALOG[codigo]) {
      const p = CATALOG[codigo];
      items.push({codigo, producto:p.producto, und:p.und, cantidad:cant});
      // Descontar stock
      updateStock(codigo, -cant);
      // Registrar movimiento
      const id='mov_'+ts()+'_'+codigo;
      state.movements[id] = {id, tipo:'SALIDA', codigo, producto:p.producto, und:p.und, cantidad:cant,
        fecha:document.getElementById('f_fecha_rem').value,
        remision:document.getElementById('f_nrem').value,
        responsable:elaboradoPor, descripcion:'Remisión '+document.getElementById('f_nrem').value, ts:ts()};
    }
  });
  if (items.length===0) { toast('⚠️ Agrega al menos un ítem válido',true); return; }
  const id = 'rem_'+ts();
  state.remisiones[id] = {
    id, numero: document.getElementById('f_nrem').value,
    fecha: document.getElementById('f_fecha_rem').value,
    elaboradoPor, cargo: document.getElementById('f_cargo_rem').value,
    obra: document.getElementById('f_obra_rem').value,
    para: document.getElementById('f_para_rem').value,
    empresa: document.getElementById('f_emp_rem').value,
    tipo: document.getElementById('f_tipo_rem').value,
    items, observacion: document.getElementById('f_obs_rem').value,
    firma: document.getElementById('f_firma_rem').value,
    ts: ts()
  };
  dbSet('rem', state.remisiones);
  dbSet('moves', state.movements);
  remItemCount = 1; scItemCount = 1;
  toast('📋 Remisión generada: ' + document.getElementById('f_nrem').value);
  state.sub='lista'; render();
}

function registrarPrestamo() {
  const nombre = document.getElementById('f_nom_pr').value;
  const equipo = document.getElementById('f_eq_pr').value;
  if (!nombre||!equipo) { toast('⚠️ Completa nombre y equipo',true); return; }
  const id='loan_'+ts();
  state.loans[id] = {
    id, nombre, equipo,
    doc: document.getElementById('f_doc_pr').value,
    empresa: document.getElementById('f_emp_pr').value,
    cargo: document.getElementById('f_car_pr').value,
    codigoInterno: document.getElementById('f_cod_pr').value,

function devolverPrestamo(id) {
  if (state.loans[id]) { state.loans[id].devuelto=true; state.loans[id].fechaDevolucion=todayISO(); }
  dbSet('loans', state.loans);

function registrarCompra() {
  const sol = document.getElementById('f_sol_sc').value;
  if (!sol) { toast('⚠️ Ingresa quien solicita',true); return; }
  const items = [];
  document.querySelectorAll('#sc-items-wrap .rem-line').forEach(el => {
    const codEl = el.querySelector('.ri-cod');
    const cantEl = el.querySelector('.fi[id^=sci_cant_]') || el.querySelectorAll('input')[1];
    if (!codEl||!cantEl) return;
    const codigo = parseInt(codEl.value);
    const cant = parseFloat(cantEl.value||0);
    if (codigo&&cant>0&&CATALOG[codigo]) {
      const p=CATALOG[codigo];
      items.push({codigo,producto:p.producto,und:p.und,cantidad:cant});
    }
  });
  if (items.length===0) { toast('⚠️ Agrega al menos un ítem',true); return; }
  const id='ord_'+ts();
  state.orders[id] = {
    id, numero: document.getElementById('f_nsc').value,
    fecha: document.getElementById('f_fecha_sc').value,
    solicitante:sol, cargo: document.getElementById('f_car_sc').value,
    obra: document.getElementById('f_obra_sc').value,
    ccos: document.getElementById('f_ccos_sc').value,
    items, ts:ts()
  };
  dbSet('orders', state.orders);
  scItemCount=1;
  toast('🛒 Solicitud generada');
  state.sub='historial'; render();
}

// ── Helpers de estilo para celdas ──
function xlsxWb() { return XLSX.utils.book_new(); }

function styledSheet(data, cols) {
  const ws = XLSX.utils.aoa_to_sheet([cols, ...data]);
  // Ancho de columnas automático
  const widths = cols.map((c,i) => {
    const maxData = data.reduce((m,r) => Math.max(m, String(r[i]||'').length), 0);
    return { wch: Math.max(c.length, maxData, 8) + 2 };
  });
  ws['!cols'] = widths;
  return ws;
}

function xlsxDownload(wb, name) {
  const fecha = todayISO().replace(/-/g,'');
  XLSX.writeFile(wb, `TCP_${name}_${fecha}.xlsx`);
  toast(`✅ ${name}.xlsx descargado`);
}

function filterByDates(arr, desde, hasta) {
  if (!desde && !hasta) return arr;
  return arr.filter(r => {
    const f = r.fecha || r.fechaSalida || '';
    if (desde && f < desde) return false;
    if (hasta && f > hasta) return false;
    return true;
  });
}

function exportInventario() {
  const prods = getProducts();
  const wb = xlsxWb();

  const cols = ['CÓDIGO','PRODUCTO','CATEGORÍA','UBICACIÓN','UNIDAD','EXISTENCIA ACTUAL','STOCK MÍNIMO','PRECIO/UND','VALOR EXISTENCIA','ESTADO'];
  const toRow = p => [
    p.codigo, p.producto, p.categoria, p.ubicacion, p.und,
    p.existencia, p.stock_min,
    p.precio || 0,
    p.precio ? Math.round(p.existencia * p.precio) : 0,
    p.status
  ];

  XLSX.utils.book_append_sheet(wb, styledSheet(prods.map(toRow), cols), 'Inventario Completo');
  XLSX.utils.book_append_sheet(wb, styledSheet(prods.filter(p=>p.status==='Agotado').map(toRow), cols), 'Agotados');
  XLSX.utils.book_append_sheet(wb, styledSheet(prods.filter(p=>p.status==='Menor al mínimo').map(toRow), cols), 'Bajo Minimo');

  xlsxDownload(wb, 'Inventario');
}

// ── 2. MOVIMIENTOS ──
function exportMovimientos(desde, hasta) {
  let moves = objArr(state.movements).sort((a,b)=>(a.fecha||'')>(b.fecha||'')?1:-1);
  if (desde||hasta) moves = filterByDates(moves, desde, hasta);

  const wb = xlsxWb();
  const cols = ['#','TIPO','FECHA','CÓDIGO','PRODUCTO','UNIDAD','CANTIDAD','REMISIÓN/SOLICITUD','RESPONSABLE','PROVEEDOR/AUTORIZADO','DESCRIPCIÓN/DESTINO'];
  const toRow = (m,i) => [
    i+1, m.tipo||'', m.fecha||'', m.codigo||'', m.producto||'', m.und||'',
    m.cantidad||0, m.remision||'', m.responsable||'',
    m.proveedor||m.autorizado||'', m.descripcion||''
  ];

  XLSX.utils.book_append_sheet(wb, styledSheet(moves.map(toRow), cols), 'Todos los Movimientos');
  XLSX.utils.book_append_sheet(wb, styledSheet(moves.filter(m=>m.tipo==='ENTRADA').map(toRow), cols), 'Solo Entradas');
  XLSX.utils.book_append_sheet(wb, styledSheet(moves.filter(m=>m.tipo==='SALIDA').map(toRow), cols), 'Solo Salidas');

  xlsxDownload(wb, 'Movimientos');
}

// ── 3. REMISIONES ──
function exportRemisiones(desde, hasta) {
  let rems = objArr(state.remisiones).sort((a,b)=>(a.fecha||'')>(b.fecha||'')?1:-1);
  if (desde||hasta) rems = filterByDates(rems, desde, hasta);

  const wb = xlsxWb();

  // Hoja 1: encabezados
  const colsEnc = ['N° REMISIÓN','FECHA','TIPO','ELABORADO POR','CARGO','OBRA/PROYECTO','ENTREGADO A','EMPRESA','OBSERVACIÓN','FIRMA'];
  const rowsEnc = rems.map(r=>[r.numero||'',r.fecha||'',r.tipo||'',r.elaboradoPor||'',r.cargo||'',r.obra||'',r.para||'',r.empresa||'',r.observacion||'',r.firma||'']);
  XLSX.utils.book_append_sheet(wb, styledSheet(rowsEnc, colsEnc), 'Remisiones');

  // Hoja 2: detalle de ítems
  const colsIt = ['N° REMISIÓN','FECHA','CÓDIGO PRODUCTO','PRODUCTO','UNIDAD','CANTIDAD'];
  const rowsIt = [];
  rems.forEach(r => (r.items||[]).forEach(it => rowsIt.push([r.numero||'',r.fecha||'',it.codigo||'',it.producto||'',it.und||'',it.cantidad||0])));
  XLSX.utils.book_append_sheet(wb, styledSheet(rowsIt, colsIt), 'Detalle Items');

  xlsxDownload(wb, 'Remisiones');
}

// ── 4. PRÉSTAMOS ──
function exportPrestamos(desde, hasta) {
  let loans = objArr(state.loans).sort((a,b)=>(a.fechaSalida||'')>(b.fechaSalida||'')?1:-1);
  if (desde||hasta) loans = filterByDates(loans, desde, hasta);

  const wb = xlsxWb();
  const cols = ['NOMBRE','N° DOCUMENTO','EMPRESA','CARGO','EQUIPO/HERRAMIENTA','CÓDIGO INTERNO','FECHA SALIDA','FECHA DEV. ESPERADA','FECHA DEVOLUCIÓN REAL','ESTADO','OBSERVACIÓN'];
  const toRow = l => [
    l.nombre||'',l.doc||'',l.empresa||'',l.cargo||'',l.equipo||'',l.codigoInterno||'',
    l.fechaSalida||'',l.fechaDevolucionEsp||'',l.fechaDevolucion||'',
    l.devuelto?'Devuelto':'Activo', l.observacion||''
  ];

  XLSX.utils.book_append_sheet(wb, styledSheet(loans.map(toRow), cols), 'Todos los Prestamos');
  XLSX.utils.book_append_sheet(wb, styledSheet(loans.filter(l=>!l.devuelto).map(toRow), cols), 'Activos');
  XLSX.utils.book_append_sheet(wb, styledSheet(loans.filter(l=>l.devuelto).map(toRow), cols), 'Devueltos');

  xlsxDownload(wb, 'Prestamos');
}

// ── 5. SOLICITUDES DE COMPRA ──
function exportCompras(desde, hasta) {
  let orders = objArr(state.orders).sort((a,b)=>(a.fecha||'')>(b.fecha||'')?1:-1);

// ── 6. REPORTE COMPLETO ──
function exportCompleto() {
  const prods = getProducts();
  const moves = objArr(state.movements).sort((a,b)=>(a.fecha||'')>(b.fecha||'')?1:-1);
  const rems  = objArr(state.remisiones).sort((a,b)=>(a.fecha||'')>(b.fecha||'')?1:-1);
  const loans = objArr(state.loans);
  const orders= objArr(state.orders);

  const wb = xlsxWb();

  // Inventario
  const colsInv = ['CÓDIGO','PRODUCTO','CATEGORÍA','UBICACIÓN','UNIDAD','EXISTENCIA','STOCK MÍN','PRECIO','VALOR','ESTADO'];
  XLSX.utils.book_append_sheet(wb, styledSheet(prods.map(p=>[p.codigo,p.producto,p.categoria,p.ubicacion,p.und,p.existencia,p.stock_min,p.precio||0,p.precio?Math.round(p.existencia*p.precio):0,p.status]), colsInv), 'Inventario');

  // Movimientos
  const colsMov = ['TIPO','FECHA','CÓDIGO','PRODUCTO','UND','CANTIDAD','REMISIÓN','RESPONSABLE','DESTINO'];
  XLSX.utils.book_append_sheet(wb, styledSheet(moves.map(m=>[m.tipo||'',m.fecha||'',m.codigo||'',m.producto||'',m.und||'',m.cantidad||0,m.remision||'',m.responsable||'',m.descripcion||'']), colsMov), 'Movimientos');

  // Remisiones
  const colsRem = ['N° REMISIÓN','FECHA','TIPO','ELABORADO POR','OBRA','ENTREGADO A','EMPRESA'];
  XLSX.utils.book_append_sheet(wb, styledSheet(rems.map(r=>[r.numero||'',r.fecha||'',r.tipo||'',r.elaboradoPor||'',r.obra||'',r.para||'',r.empresa||'']), colsRem), 'Remisiones');

  // Detalle remisiones
  const colsRIt = ['N° REMISIÓN','CÓDIGO','PRODUCTO','UND','CANTIDAD'];
  const rowsRIt = [];
  rems.forEach(r=>(r.items||[]).forEach(it=>rowsRIt.push([r.numero||'',it.codigo||'',it.producto||'',it.und||'',it.cantidad||0])));
  XLSX.utils.book_append_sheet(wb, styledSheet(rowsRIt, colsRIt), 'Detalle Remisiones');

  // Préstamos
  const colsLoan = ['NOMBRE','EMPRESA','EQUIPO','COD INTERNO','FECHA SALIDA','ESTADO'];
  XLSX.utils.book_append_sheet(wb, styledSheet(loans.map(l=>[l.nombre||'',l.empresa||'',l.equipo||'',l.codigoInterno||'',l.fechaSalida||'',l.devuelto?'Devuelto':'Activo']), colsLoan), 'Prestamos');

  // Solicitudes compra
  const colsOrd = ['N° SOLICITUD','FECHA','SOLICITANTE','OBRA','CÓDIGO','PRODUCTO','CANTIDAD'];
  const rowsOrd = [];
  orders.forEach(o=>(o.items||[]).forEach(it=>rowsOrd.push([o.numero||'',o.fecha||'',o.solicitante||'',o.obra||'',it.codigo||'',it.producto||'',it.cantidad||0])));
  XLSX.utils.book_append_sheet(wb, styledSheet(rowsOrd, colsOrd), 'Solicitudes Compra');

  xlsxDownload(wb, 'ReporteCompleto');
}

// ── 7. REPORTE FILTRADO POR FECHAS ──
function exportCompletoFiltrado() {
  const desde = (document.getElementById('exp_desde')||{}).value || '';
  const hasta = (document.getElementById('exp_hasta')||{}).value || '';
  exportMovimientos(desde, hasta);
}

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err?' err':'');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 2800);
}
